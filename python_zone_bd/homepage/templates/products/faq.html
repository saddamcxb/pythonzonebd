{% extends "base.html" %}
{% load static %}

{% block content %}

<section class="py-5 bg-light">
  <div class="container">
    <div class="text-center mb-5">
      <h2 class="fw-bold">Frequently Asked Questions</h2>
      <div class="d-flex justify-content-center">
        <hr class="me-2" style="width:60px; border:2px solid #000;">
        <hr style="width:60px; border:2px solid #000;">
      </div>
      <p class="text-muted">Here are answers to some common questions from our customers.</p>
    </div>

    <div class="accordion" id="faqAccordion">
      {% for faq in faqs %}
      <div class="accordion-item">
        <h2 class="accordion-header" id="faqHeading{{ forloop.counter }}">
          <button class="accordion-button {% if not forloop.first %}collapsed{% endif %}" type="button"
                  data-bs-toggle="collapse" data-bs-target="#faq{{ forloop.counter }}"
                  aria-expanded="{% if forloop.first %}true{% else %}false{% endif %}"
                  aria-controls="faq{{ forloop.counter }}">
            {{ faq.question }}
          </button>
        </h2>
        <div id="faq{{ forloop.counter }}" class="accordion-collapse collapse {% if forloop.first %}show{% endif %}"
             aria-labelledby="faqHeading{{ forloop.counter }}" data-bs-parent="#faqAccordion">
          <div class="accordion-body">
            {{ faq.answer }}
          </div>
        </div>
      </div>
      {% endfor %}
    </div>
  </div>
</section>
{% endblock %}
